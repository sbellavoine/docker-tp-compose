services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./api
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      NODE_ENV: development
    ports:
      - "8086:3000"
    depends_on:
      - db

volumes:
  postgres_data: